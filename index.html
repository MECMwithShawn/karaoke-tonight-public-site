<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karaoke Tonight</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --fg: #17151f;
      --muted: #646073;
      --accent: #a5185a;
      --panel: #ffffff;
      --border: #dedfeb;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    main {
      box-sizing: border-box;
      max-width: 880px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    article {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 2rem;
      line-height: 1.2;
    }

    p,
    li {
      font-size: 1rem;
    }

    p {
      margin: 0 0 16px;
    }

    ul {
      margin: 0;
      padding-left: 24px;
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }

    .muted {
      color: var(--muted);
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11131a;
        --fg: #f3f4fb;
        --muted: #c7c8d7;
        --accent: #f2a7c7;
        --panel: #1b1d27;
        --border: #373a48;
      }
    }

    @media (max-width: 560px) {
      main {
        padding: 24px 12px 40px;
      }

      article {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>Karaoke Tonight</h1>
      <p class="muted">Public app information for the current release lane.</p>
      <p>Karaoke Tonight helps users find nearby karaoke venues, save favorites, keep local song and performance notes, and plan nights with friends.</p>
      <ul>
        <li><a href="privacy.html">Privacy Policy</a></li>
        <li><a href="support.html">Support</a></li>
      </ul>
    </article>
  </main>
</body>
</html>
